<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <title>Nihar's Registration</title>
        <style></style>
        <link rel="stylesheet" href="styles.css">
    </head>
    <body>
        <header>
            <h1>Student Registration Portal</h1>
            <p>Complete the form for enrolling into the new semister</p>
        </header>
        <main>
            <form action="/register" method="post">
                <section class = "field-group">
                    <label>Student Name</label>
                    <input type="text" id="full_name" placeholder="Nihar" required>
                </section>
                <section class = "field-group">
                    <label>Student Email Id</label>
                    <input type="email" id="email" placeholder="Nihar@example.com" required>
                </section>
                <section class = "field-group">
                    <label for ="course">Courses</label>
                    <select id="course" name= "course" required>
                        <option value="">---Select---</option>
                        <option value="web_dev">Web developer</option>
                        <option value="python_dev">Python Developer</option>
                        <option value="java_dev">Java Developer</option>
                    </select>
                </section>
                <section class = "field-group">
                    <label>Enrolment date</label>
                    <input type="date" id="enroll_date">
                </section>
                <button type ="submit">Submit Form</button>
            </form>
        </main>
    </body>
</html>
